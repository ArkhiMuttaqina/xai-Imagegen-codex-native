name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Validate tag and run the full release gate
        run: |
          python scripts/versioning.py check --tag "$GITHUB_REF_NAME"
          python scripts/verify.py

      - name: Publish verified GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; replacing its generated assets."
            gh release upload "$GITHUB_REF_NAME" dist/*.zip dist/*.sha256.txt --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/*.zip dist/*.sha256.txt --generate-notes --latest --title "$GITHUB_REF_NAME"
          fi
