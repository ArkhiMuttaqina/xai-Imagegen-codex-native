name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile Python
        run: python -m py_compile install.py plugins/hashmicro-imagegen-native/scripts/mcp_server.py scripts/smoke_mcp.py scripts/build_release.py scripts/versioning.py
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: MCP smoke test
        run: python scripts/smoke_mcp.py
      - name: Version consistency
        run: python scripts/versioning.py check
      - name: Build release bundle
        run: python scripts/build_release.py
