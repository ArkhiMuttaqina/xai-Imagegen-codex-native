name: Auto Version

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:
    inputs:
      bump:
        description: Version increment
        required: true
        type: choice
        options: [patch, minor, major]
      summary:
        description: Changelog summary
        required: true
        type: string

permissions:
  actions: read
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  version:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Guard against stale or release commits
        id: guard
        env:
          EVENT_NAME: ${{ github.event_name }}
          TESTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          current_sha="$(git rev-parse HEAD)"
          subject="$(git log -1 --pretty=%s)"
          proceed=true

          if [[ "$EVENT_NAME" == "workflow_run" && "$current_sha" != "$TESTED_SHA" ]]; then
            echo "A newer main commit exists; its own CI run will handle the release."
            proceed=false
          fi

          if [[ "$subject" =~ ^chore\(release\):\ v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release commit detected; no second version bump is needed."
            proceed=false
          fi

          echo "proceed=$proceed" >> "$GITHUB_OUTPUT"

      - name: Test completed source before changing version or changelog
        if: steps.guard.outputs.proceed == 'true'
        run: python scripts/verify.py

      - name: Select version increment
        if: steps.guard.outputs.proceed == 'true'
        id: select
        env:
          SOURCE_BRANCH: ${{ github.event.workflow_run.pull_requests[0].head.ref }}
          MANUAL_BUMP: ${{ inputs.bump }}
        run: |
          commit_message="$(git log -1 --pretty=%B)"
          bump="$(python scripts/versioning.py select --branch "$SOURCE_BRANCH" --message "$commit_message" --manual "$MANUAL_BUMP")"
          echo "bump=$bump" >> "$GITHUB_OUTPUT"
          echo "Selected increment: $bump"

      - name: Update version and changelog after tests pass
        if: steps.guard.outputs.proceed == 'true'
        id: version
        env:
          MANUAL_SUMMARY: ${{ inputs.summary }}
        run: |
          summary="$MANUAL_SUMMARY"
          if [[ -z "$summary" ]]; then
            summary="$(git log -1 --pretty=%s)"
          fi
          version="$(python scripts/versioning.py bump "${{ steps.select.outputs.bump }}" --summary "$summary")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Validate final release source
        if: steps.guard.outputs.proceed == 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          python scripts/versioning.py check --tag "$TAG"
          python scripts/build_release.py
          python scripts/smoke_install.py

      - name: Commit version, changelog, and tag
        if: steps.guard.outputs.proceed == 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md README.md plugins/hashmicro-imagegen-native/.codex-plugin/plugin.json plugins/hashmicro-imagegen-native/scripts/mcp_server.py
          git commit -m "chore(release): $TAG"
          git tag -a "$TAG" -m "$TAG"
          git push origin main
          git push origin "$TAG"
